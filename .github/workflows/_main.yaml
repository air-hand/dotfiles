name: Main Jobs

on:
  workflow_call:
    secrets:
      GH_APP_PEM_FILE:
        required: true
      TF_API_TOKEN:
        required: true
      TF_CLOUD_ORGANIZATION:
        required: true
      GH_APP_INSTALLATION_ID:
        required: true

concurrency:
  group: main-${{ github.ref }}
  # Cancel in-progress runs during PR development (merged=false), but preserve merge runs (merged=true) to ensure IAC apply completes safely
  cancel-in-progress: ${{ github.event.pull_request.merged != true }}

permissions: {}

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    steps:
      # use GitHub Apps token to run other actions.
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: gh-app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PEM_FILE }}
          permission-contents: read
          permission-pull-requests: write
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: ${{ steps.gh-app-token.outputs.token }}

  ci-jobs:
    uses: ./.github/workflows/_ci.yaml
    permissions:
      contents: read
      packages: read
      statuses: write
      pull-requests: write
      issues: write
    secrets:
      GH_APP_PEM_FILE: ${{ secrets.GH_APP_PEM_FILE }}

  iac-jobs:
    needs: labeler
    if: contains(github.event.pull_request.labels.*.name, 'terraform-deps')
    uses: ./.github/workflows/_iac.yaml
    permissions:
      contents: read
      pull-requests: write
    secrets:
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
      GH_APP_PEM_FILE: ${{ secrets.GH_APP_PEM_FILE }}
